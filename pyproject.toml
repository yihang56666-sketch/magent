[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-p no:cacheprovider"
filterwarnings = [
  "ignore:record_xml_attribute is an experimental feature:pytest.PytestExperimentalApiWarning",
]

[tool.ruff]
line-length = 120
target-version = "py310"
exclude = [
  ".agents/build",
  ".agents/dist",
  ".agents/reports/runs",
]
