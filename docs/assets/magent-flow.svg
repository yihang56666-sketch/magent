<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420" role="img" aria-labelledby="title desc">
  <title id="title">Magent workflow overview</title>
  <desc id="desc">A visual overview showing a Codex task moving through advice, recipes, specialist packets, evidence, and final verification.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.55" stop-color="#17324d"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.07"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#a7f3d0"/>
    </marker>
    <style>
      .title { font: 700 46px Inter, Segoe UI, Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .subtitle { font: 400 20px Inter, Segoe UI, Arial, sans-serif; fill: #d1fae5; letter-spacing: 0; }
      .label { font: 700 18px Inter, Segoe UI, Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .body { font: 400 14px Inter, Segoe UI, Arial, sans-serif; fill: #dbeafe; letter-spacing: 0; }
      .tiny { font: 600 12px Inter, Segoe UI, Arial, sans-serif; fill: #a7f3d0; letter-spacing: 0; }
      .card { fill: url(#card); stroke: rgba(255,255,255,0.28); stroke-width: 1.2; }
      .line { stroke: #a7f3d0; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .chip { fill: rgba(17,24,39,0.45); stroke: rgba(167,243,208,0.45); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1120" height="420" rx="22" fill="url(#bg)"/>
  <path d="M0 330 C190 260 310 380 500 300 C700 215 815 260 1120 180 L1120 420 L0 420 Z" fill="#0b1220" opacity="0.24"/>
  <circle cx="935" cy="82" r="92" fill="#34d399" opacity="0.12"/>
  <circle cx="160" cy="335" r="118" fill="#60a5fa" opacity="0.10"/>

  <text x="56" y="78" class="title">Magent</text>
  <text x="56" y="112" class="subtitle">Turn one Codex session into a bounded specialist team.</text>

  <g transform="translate(56 146)">
    <rect class="chip" x="0" y="0" width="132" height="34" rx="17"/>
    <text class="tiny" x="19" y="22">LOCAL FIRST</text>
    <rect class="chip" x="146" y="0" width="154" height="34" rx="17"/>
    <text class="tiny" x="165" y="22">NO API KEY PATH</text>
    <rect class="chip" x="314" y="0" width="148" height="34" rx="17"/>
    <text class="tiny" x="333" y="22">AUDITABLE RUNS</text>
  </g>

  <g filter="url(#shadow)">
    <g transform="translate(54 228)">
      <rect class="card" width="190" height="118" rx="14"/>
      <text class="label" x="22" y="36">Task</text>
      <text class="body" x="22" y="64">Bug, release check,</text>
      <text class="body" x="22" y="84">review, docs polish</text>
      <circle cx="155" cy="36" r="16" fill="#60a5fa" opacity="0.9"/>
    </g>

    <g transform="translate(288 228)">
      <rect class="card" width="190" height="118" rx="14"/>
      <text class="label" x="22" y="36">Advise</text>
      <text class="body" x="22" y="64">Keep local or open</text>
      <text class="body" x="22" y="84">a recipe run</text>
      <circle cx="155" cy="36" r="16" fill="#fbbf24" opacity="0.95"/>
    </g>

    <g transform="translate(522 228)">
      <rect class="card" width="190" height="118" rx="14"/>
      <text class="label" x="22" y="36">Specialists</text>
      <text class="body" x="22" y="64">QA, security, backend,</text>
      <text class="body" x="22" y="84">reviewer packets</text>
      <circle cx="155" cy="36" r="16" fill="#a78bfa" opacity="0.95"/>
    </g>

    <g transform="translate(756 228)">
      <rect class="card" width="190" height="118" rx="14"/>
      <text class="label" x="22" y="36">Evidence</text>
      <text class="body" x="22" y="64">Output files and</text>
      <text class="body" x="22" y="84">synthesis.md</text>
      <circle cx="155" cy="36" r="16" fill="#34d399" opacity="0.95"/>
    </g>
  </g>

  <path class="line" d="M252 287 H278"/>
  <path class="line" d="M486 287 H512"/>
  <path class="line" d="M720 287 H746"/>

  <g transform="translate(980 228)" filter="url(#shadow)">
    <rect class="card" width="86" height="118" rx="14"/>
    <text class="label" x="17" y="36">Ship</text>
    <text class="body" x="17" y="64">Verify</text>
    <text class="body" x="17" y="84">then act</text>
  </g>
  <path class="line" d="M954 287 H970"/>
</svg>
